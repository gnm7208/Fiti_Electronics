name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --include=dev

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test
